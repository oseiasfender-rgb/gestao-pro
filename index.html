<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>OficinaOS v2.0 — Limaprata Reparações</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --copper: #b8621a;
  --coal: #1a1a1a;
  --steel: #f8f6f3;
  --success: #16a34a;
  --warning: #eab308;
  --danger: #dc2626;
}

body { font-family: 'Lato', sans-serif; background: var(--steel); margin: 0; padding-bottom: 50px; }

/* ── TIMELINE DE REPARAÇÃO ── */
.timeline-container { display: flex; justify-content: space-between; padding: 20px; background: white; border-radius: 8px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.step { text-align: center; flex: 1; position: relative; font-size: 0.7rem; color: #999; cursor: pointer; }
.step.active { color: var(--copper); font-weight: bold; }
.step::after { content: ''; position: absolute; top: 15px; width: 100%; height: 2px; background: #ddd; left: 50%; z-index: 1; }
.step:last-child::after { display: none; }
.step.active::after { background: var(--copper); }
.dot { width: 12px; height: 12px; background: #ddd; border-radius: 50%; margin: 0 auto 5px; position: relative; z-index: 2; }
.step.active .dot { background: var(--copper); box-shadow: 0 0 8px var(--copper); }

/* ── MAPA DE DANOS (SVG) ── */
.damage-map { width: 100%; max-width: 500px; margin: 20px auto; background: white; padding: 15px; border-radius: 12px; text-align: center; }
.car-svg { width: 100%; height: auto; cursor: crosshair; }
.damage-point { fill: var(--danger); stroke: white; stroke-width: 2; }

/* ── CALCULADORA ROI ── */
.roi-box { background: linear-gradient(135deg, var(--coal), #333); color: white; padding: 20px; border-radius: 12px; margin: 10px; }
.roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
.roi-res { font-size: 1.2rem; color: var(--success); font-weight: bold; }

/* ── ESTILOS GERAIS ── */
.card { background: white; margin: 10px; padding: 15px; border-radius: 8px; border-left: 4px solid var(--copper); }
button { background: var(--copper); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
</style>
</head>
<body>

<header style="background: var(--coal); color: white; padding: 20px; text-align: center;">
  <h1 style="font-family: 'Bebas Neue'; margin: 0; letter-spacing: 2px;">LIMAPRATA — GESTÃO PRO</h1>
</header>

<div class="card">
  <h3>Progresso do Serviço</h3>
  <div class="timeline-container" id="timeline">
    <div class="step active" onclick="setStep(0)"><div class="dot"></div>Entrada</div>
    <div class="step" onclick="setStep(1)"><div class="dot"></div>Funilaria</div>
    <div class="step" onclick="setStep(2)"><div class="dot"></div>Pintura</div>
    <div class="step" onclick="setStep(3)"><div class="dot"></div>Montagem</div>
    <div class="step" onclick="setStep(4)"><div class="dot"></div>Pronto</div>
  </div>
</div>

<div class="card">
  <h3>Check-list: Mapa de Danos</h3>
  <p style="font-size: 0.8rem; color: #666;">Clique no carro para marcar riscos ou mossas.</p>
  <div class="damage-map">
    <svg class="car-svg" viewBox="0 0 600 300" onclick="markDamage(event)">
      <rect x="150" y="50" width="300" height="200" rx="40" fill="none" stroke="#ccc" stroke-width="2" />
      <rect x="200" y="70" width="200" height="160" rx="20" fill="none" stroke="#eee" stroke-width="2" /> <path d="M150 100 Q 100 150 150 200" fill="none" stroke="#ccc" stroke-width="2" /> <path d="M450 100 Q 500 150 450 200" fill="none" stroke="#ccc" stroke-width="2" /> <g id="damagePoints"></g>
    </svg>
    <button onclick="clearDamage()" style="background: #666; font-size: 0.7rem;">Limpar Mapa</button>
  </div>
</div>

<div class="roi-box">
  <h3 style="margin: 0;">💰 Consultoria de Valorização</h3>
  <p style="font-size: 0.8rem; opacity: 0.8;">Mostre ao cliente o ganho na revenda.</p>
  <div class="roi-grid">
    <div>
      <label>Valor de Mercado (€)</label>
      <input type="number" id="carValue" placeholder="Ex: 15000" oninput="calcROI()">
    </div>
    <div>
      <label>Custo Reparação (€)</label>
      <input type="number" id="fixCost" placeholder="Ex: 500" oninput="calcROI()">
    </div>
  </div>
  <div style="margin-top: 15px; border-top: 1px solid #555; padding-top: 10px;">
    <span>Valorização Estimada: </span>
    <span id="roiResult" class="roi-res">€ 0.00</span>
  </div>
</div>

<script>
// --- LÓGICA DA TIMELINE ---
function setStep(index) {
    const steps = document.querySelectorAll('.step');
    steps.forEach((s, i) => {
        if(i <= index) s.classList.add('active');
        else s.classList.remove('active');
    });
}

// --- LÓGICA DO MAPA DE DANOS ---
function markDamage(event) {
    const svg = event.currentTarget;
    const pt = svg.createSVGPoint();
    pt.x = event.clientX;
    pt.y = event.clientY;
    const cursorpt = pt.matrixTransform(svg.getScreenCTM().inverse());

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", cursorpt.x);
    circle.setAttribute("cy", cursorpt.y);
    circle.setAttribute("r", "6");
    circle.setAttribute("class", "damage-point");
    document.getElementById('damagePoints').appendChild(circle);
}

function clearDamage() {
    document.getElementById('damagePoints').innerHTML = '';
}

// --- LÓGICA DA CALCULADORA ROI ---
function calcROI() {
    const val = parseFloat(document.getElementById('carValue').value) || 0;
    const cost = parseFloat(document.getElementById('fixCost').value) || 0;
    
    // Regra de negócio: Um carro reparado vale cerca de 10-15% mais que um batido
    const valorizacao = (val * 0.12); 
    const lucroReal = valorizacao - cost;

    document.getElementById('roiResult').innerText = '€ ' + valorizacao.toLocaleString('pt-PT', {minimumFractionDigits: 2});
}
</script>

</body>
</html>
